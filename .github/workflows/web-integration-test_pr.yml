name: "[docker][pr] Web Integration Test"

on:
  pull_request:
    branches: [master, develop]
    paths:
      - 'docker-compose*.yaml'
      - 'apps/api/**'
      - 'apps/web-player/**'
      - 'apps/web-artists/**'
      - 'apps/admin/**'
      - '.github/workflows/web-integration-test_pr.yml'
      - '.github/actions/setup-docker/**'
  workflow_dispatch:

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          # Remove unnecessary packages
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          # Clean Docker
          docker system prune -af --volumes

          # Show available space
          df -h

      - name: Create .env file
        run: |
          cp .env.example .env
          echo "JWT_SECRET=test_secret_key_for_ci" >> .env
          echo "DATABASE_URL=postgresql://admin:admin@postgres:5432/spotify" >> .env
          echo "SHADOW_DATABASE_URL=postgresql://admin:admin@postgres:5432/spotify_shadow" >> .env

      - name: Build application images
        run: |
          docker compose -f docker-compose.preprod.yaml build api web-player web-artists admin

      - name: Start services
        run: |
          docker compose -f docker-compose.preprod.yaml up -d postgres redis
          sleep 10

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until docker compose -f docker-compose.preprod.yaml exec -T postgres pg_isready -U admin; do sleep 1; done'
          docker compose -f docker-compose.preprod.yaml exec -T redis redis-cli ping

      - name: Start application services
        run: |
          docker compose -f docker-compose.preprod.yaml up -d api web-player web-artists admin
          sleep 20

      - name: Check container status
        run: |
          docker compose -f docker-compose.preprod.yaml ps
          docker compose -f docker-compose.preprod.yaml logs --tail=50 api
          docker compose -f docker-compose.preprod.yaml logs --tail=50 web-player
          docker compose -f docker-compose.preprod.yaml logs --tail=50 web-artists
          docker compose -f docker-compose.preprod.yaml logs --tail=50 admin

      - name: Run health checks
        run: |
          for i in {1..30}; do
            echo "=== Health check attempt $i/30 ==="

            # Check API health endpoint
            if curl -sf http://localhost:3000/api/v1/health; then
              echo "✅ API is healthy"
              API_OK=1
            else
              echo "❌ API health check failed"
              API_OK=0
            fi

            # Check Web - run inside container (curl not guaranteed on host)
            if docker compose -f docker-compose.preprod.yaml exec -T web-player node -e "const req=require('http').get('http://localhost:3001', (r)=>{console.log('Web status:', r.statusCode); process.exit(0);}); req.on('error', (e)=>{console.error('Web error:', e.message); process.exit(1);});"; then
              echo "✅ Web is healthy"
              WEB_OK=1
            else
              echo "❌ Web health check failed"
              WEB_OK=0
            fi

            # Check Admin - Kottster runs on port 5480 internally
            if docker compose -f docker-compose.preprod.yaml exec -T admin node -e "const req=require('http').get('http://localhost:5480', (r)=>{console.log('Admin status:', r.statusCode); process.exit(0);}); req.on('error', (e)=>{console.error('Admin error:', e.message); process.exit(1);});"; then
              echo "✅ Admin is healthy"
              ADMIN_OK=1
            else
              echo "❌ Admin health check failed"
              ADMIN_OK=0
            fi

            # All healthy?
            if [ "$API_OK" = "1" ] && [ "$WEB_OK" = "1" ] && [ "$ADMIN_OK" = "1" ]; then
              echo "✅ All services are healthy"
              exit 0
            fi
            echo "Waiting for services... ($i/30)"
            sleep 2
          done
          echo "❌ Services failed to become healthy"
          exit 1

      - name: Run database migrations
        run: |
          docker compose -f docker-compose.preprod.yaml exec -T postgres psql -U admin -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='spotify_shadow'" | grep -q 1 || \
            docker compose -f docker-compose.preprod.yaml exec -T postgres psql -U admin -d postgres -c "CREATE DATABASE spotify_shadow;"
          docker compose -f docker-compose.preprod.yaml exec -T api pnpm --filter @spotify/api run db:gen
          docker compose -f docker-compose.preprod.yaml exec -T api pnpm --filter @spotify/api run db:migration:start

      - name: Seed database
        run: |
          docker compose -f docker-compose.preprod.yaml exec -T api sh -c "cd apps/api && pnpm prisma db seed"

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker compose -f docker-compose.preprod.yaml logs api
          echo "=== Web Logs ==="
          docker compose -f docker-compose.preprod.yaml logs web-player
          echo "=== Postgres Logs ==="
          docker compose -f docker-compose.preprod.yaml logs postgres

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.preprod.yaml down -v