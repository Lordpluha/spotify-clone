name: "[platform][master] Production Deploy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - api
          - web-player
          - web-artists
          - admin

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}-${{ github.event.inputs.service || 'all' }}
  cancel-in-progress: false

env:
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}
  TARGET_SERVICE: ${{ github.event.inputs.service || 'all' }}

jobs:
  # Build and Deploy
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate config
        run: docker compose -f docker-compose.prod.yaml config

      - name: Setup Docker + registries
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ghcr.io
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          if [ "${{ env.TARGET_SERVICE }}" = "all" ]; then
            SERVICES="api web-player web-artists admin"
          else
            SERVICES="${{ env.TARGET_SERVICE }}"
          fi

          for service in $SERVICES; do
            docker buildx build \
              --file ./apps/$service/Dockerfile \
              --tag ghcr.io/${{ github.repository }}/$service:${{ env.DEPLOY_ENV }} \
              --tag ghcr.io/${{ github.repository }}/$service:${{ github.sha }} \
              --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/cache/$service:buildcache \
              --cache-from type=gha,scope=$service \
              --cache-to type=registry,ref=ghcr.io/${{ github.repository }}/cache/$service:buildcache,mode=max \
              --cache-to type=gha,mode=max,scope=$service \
              --target production \
              --push .
          done

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            cd ${{ secrets.DEPLOY_PATH }}

            if [ "${{ env.TARGET_SERVICE }}" = "all" ]; then
              SERVICES="api web-player web-artists admin"
            else
              SERVICES="${{ env.TARGET_SERVICE }}"
            fi

            # Backup database
            docker compose exec -T postgres pg_dump > backup.sql

            # Pull and deploy
            docker compose -f docker-compose.prod.yaml pull $SERVICES
            docker compose -f docker-compose.prod.yaml up -d $SERVICES
            # Cleanup
            docker image prune -af
          ENDSSH

      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -sf https://${{ secrets.SERVER_HOST }}/health; then
              exit 0
            fi
            sleep 5
          done
          exit 1

  # Post-deployment notification
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Result
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
