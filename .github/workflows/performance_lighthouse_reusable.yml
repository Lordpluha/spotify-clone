name: "[performance] Lighthouse Reusable"

on:
  workflow_call:

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build dependencies
        run: pnpm --filter @spotify/ui-react run build

      - name: Build web app
        run: pnpm --filter @spotify/web-player run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Start web app
        run: |
          cd apps/web-player
          pnpm exec next start -p 3001 &
          for i in {1..30}; do
            if curl -f http://localhost:3001 > /dev/null 2>&1; then
              echo "Web app is ready"
              break
            fi
            echo "Waiting for web app... ($i/30)"
            sleep 1
          done
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:3001
            http://localhost:3001/browse
            http://localhost:3001/search
          uploadArtifacts: false
          temporaryPublicStorage: true
