name: "[desktop][master] Build"

on:
  push:
    branches: [master]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/desktop_master.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: lordpluha/${{ github.event.repository.name }}

jobs:
  desktop-native-build:
    name: Desktop Native Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Build desktop app (native)
        run: pnpm --filter @spotify/desktop run tauri build

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-master-${{ matrix.platform }}
          path: apps/desktop/src-tauri/target/release/bundle/**/*
          retention-days: 7
          if-no-files-found: warn

  desktop-build:
    name: Desktop Build (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Desktop App (Docker)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/desktop/Dockerfile
          target: ci-build
          load: false
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/desktop:master
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/desktop:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop:buildcache
            type=gha,scope=desktop
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop:buildcache,mode=max
            type=gha,mode=max,scope=desktop

      - name: Pull pushed image for artifact extraction
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/desktop:${{ github.sha }}

      - name: Extract Build Artifacts
        run: |
          docker create --name temp-desktop-master ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/desktop:${{ github.sha }}
          docker cp temp-desktop-master:/app/apps/desktop/src-tauri/target/release/bundle ./desktop-artifacts || true
          docker rm temp-desktop-master

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-master-linux
          path: desktop-artifacts/**/*
          retention-days: 7
          if-no-files-found: ignore
