name: "[ui-react] Reusable"

on:
  workflow_call:
    inputs:
      run-biome:
        description: Run biome check before Loki
        required: false
        default: true
        type: boolean
      run-loki:
        description: Run Loki visual tests
        required: false
        default: true
        type: boolean

jobs:
  biome:
    if: ${{ inputs.run-biome }}
    name: UI React Biome
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Biome check
        run: pnpm exec biome ci packages/ui-react

  loki:
    if: ${{ always() && inputs.run-loki && (!inputs.run-biome || needs.biome.result == 'success') }}
    needs: biome
    uses: ./.github/workflows/loki_reusable.yml
