name: "[api][develop] Checks"

on:
  push:
    branches: [develop]
    paths:
      - 'apps/api/**'
      - 'packages/contracts/**'
      - '.github/workflows/api_develop.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  api-build:
    name: API Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker + registries
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:develop-${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/api:buildcache
            type=gha,scope=api
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/api:buildcache,mode=max
            type=gha,mode=max,scope=api
          target: production

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: api-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Generate Prisma Client
        run: pnpm --filter @spotify/api run db:gen
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run migrations
        run: pnpm --filter @spotify/api run db:migration:start
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run unit tests
        run: pnpm --filter @spotify/api run test
        continue-on-error: true

      - name: Run integration tests
        run: pnpm --filter @spotify/api run test:int
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        continue-on-error: true

      - name: Run e2e tests
        run: pnpm --filter @spotify/api run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        continue-on-error: true
