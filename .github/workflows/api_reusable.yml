name: "[api] Reusable"

on:
  workflow_call:
    inputs:
      push-image:
        description: Push API image
        required: true
        type: boolean
      image-tags:
        description: Docker tags for API image (multiline)
        required: true
        type: string
      timeout-build:
        description: Timeout for API build job
        required: false
        default: 15
        type: number
      run-biome:
        description: Run biome check before Docker build
        required: false
        default: true
        type: boolean
      run-tests:
        description: Run API tests after image build
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: lordpluha/${{ github.event.repository.name }}

jobs:
  api-build:
    name: API Build
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        if: ${{ inputs.run-biome }}
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Biome check
        if: ${{ inputs.run-biome }}
        run: pnpm exec biome ci apps/api packages/contracts

      - name: Setup Docker + registries
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: ${{ inputs.push-image }}
          tags: ${{ inputs.image-tags }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/api:buildcache
            type=gha,scope=api
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/api:buildcache,mode=max
            type=gha,mode=max,scope=api
          target: production

  api-tests:
    if: ${{ inputs.run-tests }}
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: api-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Generate Prisma Client
        run: pnpm --filter @spotify/api run db:gen
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Create shadow database
        run: |
          PGPASSWORD=test psql -h localhost -U test -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'test_shadow'" | grep -q 1 || \
          PGPASSWORD=test psql -h localhost -U test -d postgres -c "CREATE DATABASE test_shadow;"

      - name: Run migrations
        run: pnpm --filter @spotify/api run db:migration:start
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/test_shadow

      - name: Run unit tests
        run: pnpm --filter @spotify/api run test
        continue-on-error: true

      - name: Run integration tests
        run: pnpm --filter @spotify/api run test:int
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        continue-on-error: true

      - name: Run e2e tests
        run: pnpm --filter @spotify/api run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        continue-on-error: true
