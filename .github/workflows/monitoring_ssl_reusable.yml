name: "[monitoring] SSL Reusable"

on:
  workflow_call:
    secrets:
      monitor-host:
        required: true

jobs:
  ssl-check:
    name: SSL Certificate Check
    runs-on: ubuntu-latest

    env:
      MONITOR_HOST: ${{ secrets.monitor-host }}

    steps:
      - name: Validate monitoring host
        run: |
          if [ -z "${{ env.MONITOR_HOST }}" ]; then
            echo "❌ Missing monitoring host"
            exit 1
          fi

      - name: Check certificate
        run: |
          expiry=$(echo | openssl s_client -servername ${{ env.MONITOR_HOST }} -connect ${{ env.MONITOR_HOST }}:443 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2)
          echo "SSL certificate expires: $expiry"

          expiry_epoch=$(date -d "$expiry" +%s)
          now_epoch=$(date +%s)
          days_left=$(( (expiry_epoch - now_epoch) / 86400 ))

          echo "Days until expiry: $days_left"

          if [ "$days_left" -lt 30 ]; then
            echo "⚠️  SSL certificate expires in $days_left days!"
            exit 1
          fi
