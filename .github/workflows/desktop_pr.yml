name: "[desktop][pr] Checks"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: lordpluha/${{ github.event.repository.name }}

jobs:
  desktop-native-build:
    name: Desktop Native Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Rust
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: ${{ (github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform) && runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Build desktop app (native)
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        run: pnpm --filter @spotify/desktop run tauri build

      - name: Upload native artifacts
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pr-${{ matrix.platform }}
          path: apps/desktop/src-tauri/target/release/bundle/**/*
          retention-days: 7
          if-no-files-found: warn

  desktop-build:
    name: Desktop Build (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Desktop App (Docker)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/desktop/Dockerfile
          target: ci-build
          load: true
          push: false
          tags: spotify-desktop-pr:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop:buildcache
            type=gha,scope=desktop
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop:buildcache,mode=max
            type=gha,mode=max,scope=desktop

  desktop-ui-test:
    name: Desktop UI Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: desktop-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build UI Dev Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/desktop/Dockerfile
          target: development
          load: true
          push: false
          tags: desktop-ui-pr:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop-dev:buildcache
            type=gha,scope=desktop-dev
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop-dev:buildcache,mode=max
            type=gha,mode=max,scope=desktop-dev

      - name: Run UI Server and test endpoint
        run: |
          docker run -d -p 1420:1420 --name desktop-ui-pr-test desktop-ui-pr:${{ github.sha }}
          sleep 10
          curl -f http://localhost:1420 || exit 1

      - name: Cleanup
        if: always()
        run: docker stop desktop-ui-pr-test && docker rm desktop-ui-pr-test || true
