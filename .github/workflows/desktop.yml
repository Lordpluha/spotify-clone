name: "[desktop][pr+develop+master] Build"

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: ./.github/actions/setup-docker
      with:
        ghcr: "true"
        ghcr-registry: ${{ env.REGISTRY }}
        ghcr-username: ${{ github.actor }}
        ghcr-password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Desktop App (Docker)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./apps/desktop/Dockerfile
        target: ci-build
        load: true
        push: false
        tags: spotify-desktop-builder:${{ github.sha }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop:buildcache
          type=gha,scope=desktop
        cache-to: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop:buildcache,mode=max
          type=gha,mode=max,scope=desktop

    - name: List build contents
      run: |
        docker run --rm spotify-desktop-builder:${{ github.sha }} sh -c "ls -la /app/apps/desktop/src-tauri/target/ || echo 'No target dir'"
        docker run --rm spotify-desktop-builder:${{ github.sha }} sh -c "ls -la /app/apps/desktop/src-tauri/target/release/ || echo 'No release dir'"
        docker run --rm spotify-desktop-builder:${{ github.sha }} sh -c "ls -la /app/apps/desktop/src-tauri/target/release/bundle/ || echo 'No bundle dir'"

    - name: Extract Build Artifacts
      run: |
        docker create --name temp-desktop spotify-desktop-builder:${{ github.sha }}
        docker cp temp-desktop:/app/apps/desktop/src-tauri/target/release/bundle ./desktop-artifacts || echo "No artifacts found"
        docker rm temp-desktop
        ls -la desktop-artifacts/ || echo "Artifacts directory not created"

    - name: Upload Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: desktop-linux-x64
        path: desktop-artifacts/**/*
        retention-days: 7
        if-no-files-found: error

  build-windows:
    name: Build for Windows
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js and pnpm
      uses: ./.github/actions/setup-node-pnpm

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build Desktop App
      run: |
        cd apps/desktop
        pnpm run tauri build
      env:
        CARGO_INCREMENTAL: 0
        CARGO_TERM_COLOR: always

    - name: List build artifacts
      if: always()
      run: |
        echo "Contents of target/release:"
        dir apps\desktop\src-tauri\target\release\ 2>$null || echo "No release directory"
        echo "Contents of target/release/bundle:"
        dir apps\desktop\src-tauri\target\release\bundle\ 2>$null || echo "No bundle directory"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: desktop-windows-x64
        path: apps/desktop/src-tauri/target/release/bundle/**/*.exe
        retention-days: 7
        if-no-files-found: error

  build-macos:
    name: Build for macOS
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js and pnpm
      uses: ./.github/actions/setup-node-pnpm

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build Desktop App
      run: |
        cd apps/desktop
        pnpm run tauri build
      env:
        CARGO_INCREMENTAL: 0
        CARGO_TERM_COLOR: always

    - name: List build artifacts
      if: always()
      run: |
        echo "Contents of target/release:"
        ls -la apps/desktop/src-tauri/target/release/ || echo "No release directory"
        echo "Contents of target/release/bundle:"
        ls -la apps/desktop/src-tauri/target/release/bundle/ || echo "No bundle directory"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: desktop-macos-universal
        path: apps/desktop/src-tauri/target/release/bundle/**/*
        retention-days: 7
        if-no-files-found: error

  test:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: ./.github/actions/setup-docker
      with:
        ghcr: "true"
        ghcr-registry: ${{ env.REGISTRY }}
        ghcr-username: ${{ github.actor }}
        ghcr-password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build UI Dev Server
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./apps/desktop/Dockerfile
        target: development
        load: true
        push: false
        tags: desktop-ui-test:${{ github.sha }}
        cache-from: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop-dev:buildcache
          type=gha,scope=desktop-dev
        cache-to: |
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/desktop-dev:buildcache,mode=max
          type=gha,mode=max,scope=desktop-dev

    - name: Run UI Server
      run: |
        docker run -d -p 1420:1420 --name ui-test desktop-ui-test:${{ github.sha }}
        sleep 10

    - name: Test UI Endpoint
      run: |
        curl -f http://localhost:1420 || exit 1

    - name: Cleanup
      if: always()
      run: docker stop ui-test && docker rm ui-test
