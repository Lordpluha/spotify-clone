name: "[ui-react][pr] Visual Tests"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop]
    paths:
      - 'packages/ui-react/**'
      - '.github/workflows/ui_react_pr.yml'
      - '.github/workflows/loki_reusable.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  biome:
    name: UI React Biome
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Biome check
        run: pnpm exec biome ci packages/ui-react

  loki:
    needs: biome
    uses: ./.github/workflows/loki_reusable.yml
