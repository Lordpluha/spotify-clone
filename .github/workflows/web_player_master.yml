name: "[web-player][master] Build"

on:
  push:
    branches: [master]
    paths:
      - 'apps/web-player/**'
      - 'packages/ui-react/**'
      - 'packages/contracts/**'
      - '.github/workflows/web_player_master.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  web-player-build-and-image:
    name: Build Web Player and Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker + registries
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web Player image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web-player/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web-player:master
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web-player:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/web-player:buildcache
            type=gha,scope=web-player
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/web-player:buildcache,mode=max
            type=gha,mode=max,scope=web-player
          target: production
