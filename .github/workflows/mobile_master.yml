name: "[mobile][master] Build"

on:
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile_master.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  mobile-web-build:
    name: Mobile Expo Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Web Production
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/mobile/Dockerfile
          target: production-web
          load: true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mobile-web:master
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mobile-web:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/mobile-web:buildcache
            type=gha,scope=mobile-web
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/mobile-web:buildcache,mode=max
            type=gha,mode=max,scope=mobile-web

  mobile-eas-prod:
    name: Mobile EAS Production Build
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Expo
        if: env.EXPO_TOKEN != ''
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Setup Node.js and pnpm
        if: env.EXPO_TOKEN != ''
        uses: ./.github/actions/setup-node-pnpm

      - name: Build Android and iOS (production)
        if: env.EXPO_TOKEN != ''
        working-directory: apps/mobile
        run: eas build --platform all --profile production --non-interactive

      - name: Skip EAS build (no token)
        if: env.EXPO_TOKEN == ''
        run: echo "EXPO_TOKEN is not set, skipping EAS production build"
