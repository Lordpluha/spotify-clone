name: "[monitoring] Dependency Reusable"

on:
  workflow_call:
    inputs:
      branch-name:
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  dependency-updates:
    name: Check Dependency Updates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: "false"

      - name: Check for updates
        run: |
          pnpm outdated --long > dependency-updates.txt || true
          cat dependency-updates.txt

      - name: Create or update issue for major updates
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const updates = fs.readFileSync('dependency-updates.txt', 'utf8');

            if (!updates.includes('major')) {
              core.info('No major dependency updates found');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = '${{ inputs.branch-name }}';
            const title = `🔄 Dependency Updates Available (${branch})`;
            const body = [
              `## Available dependency updates (${branch})`,
              '',
              '```',
              updates,
              '```',
              '',
              'Please review and update.'
            ].join('\n');

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'dependencies,maintenance',
              per_page: 100,
            });

            const issue = existing.find((item) => item.title === title);

            if (issue) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
              core.info(`Updated existing issue #${issue.number}`);
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['dependencies', 'maintenance'],
            });
