name: "[web-artists][develop] Checks"

on:
  push:
    branches: [develop]
    paths:
      - 'apps/web-artists/**'
      - 'packages/ui-react/**'
      - 'packages/contracts/**'
      - '.github/workflows/web_artists_develop.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  web-artists-checks:
    name: Web Artists Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker + registries
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Web Artists Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web-artists/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web-artists:develop
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web-artists:develop-${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/web-artists:buildcache
            type=gha,scope=web-artists
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/web-artists:buildcache,mode=max
            type=gha,mode=max,scope=web-artists
          target: production
