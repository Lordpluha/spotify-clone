name: "[mobile][pr] Checks"

on:
  pull_request:
    branches: [master, develop]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile_pr.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  mobile-web-build:
    name: Mobile Expo Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Web Production
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/mobile/Dockerfile
          target: production-web
          load: true
          push: false
          tags: mobile-web-pr:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/mobile-web:buildcache
            type=gha,scope=mobile-web
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/mobile-web:buildcache,mode=max
            type=gha,mode=max,scope=mobile-web

      - name: Test Web Build
        run: |
          docker run -d -p 8080:80 --name mobile-web-pr-test mobile-web-pr:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080 || exit 1

      - name: Cleanup
        if: always()
        run: docker stop mobile-web-pr-test && docker rm mobile-web-pr-test || true
