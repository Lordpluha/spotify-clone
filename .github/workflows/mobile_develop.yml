name: "[mobile][develop] Checks"

on:
  push:
    branches: [develop]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile_develop.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: lordpluha/${{ github.event.repository.name }}

jobs:
  expo-dev-server-check:
    name: Expo Dev Server Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Expo Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/mobile/Dockerfile
          target: development
          load: true
          push: false
          tags: mobile-expo-develop:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/mobile-dev:buildcache
            type=gha,scope=mobile-dev
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/mobile-dev:buildcache,mode=max
            type=gha,mode=max,scope=mobile-dev

      - name: Run Expo Server
        run: |
          docker run -d \
            -p 8081:8081 \
            -p 19000:19000 \
            --name mobile-expo-develop-test \
            mobile-expo-develop:${{ github.sha }}

      - name: Wait for server
        run: sleep 20

      - name: Check Metro Bundler
        run: curl -f http://localhost:8081/status || exit 1

      - name: Show logs
        if: failure()
        run: docker logs mobile-expo-develop-test

      - name: Cleanup
        if: always()
        run: docker stop mobile-expo-develop-test && docker rm mobile-expo-develop-test || true

  mobile-web-build:
    name: Mobile Expo Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: ./.github/actions/setup-docker
        with:
          ghcr: "true"
          ghcr-registry: ${{ env.REGISTRY }}
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Web Production
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/mobile/Dockerfile
          target: production-web
          load: false
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mobile-web:develop
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mobile-web:develop-${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/mobile-web:buildcache
            type=gha,scope=mobile-web
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cache/mobile-web:buildcache,mode=max
            type=gha,mode=max,scope=mobile-web

      - name: Pull pushed image for test
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mobile-web:develop-${{ github.sha }}

      - name: Test Web Build
        run: |
          docker run -d -p 8080:80 --name mobile-web-develop-test ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mobile-web:develop-${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080 || exit 1

      - name: Cleanup
        if: always()
        run: docker stop mobile-web-develop-test && docker rm mobile-web-develop-test || true

  build-android-eas:
    name: Build Android with EAS (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Expo
        if: env.EXPO_TOKEN != ''
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Setup Node.js and pnpm
        if: env.EXPO_TOKEN != ''
        uses: ./.github/actions/setup-node-pnpm

      - name: Build Android APK
        if: env.EXPO_TOKEN != ''
        working-directory: apps/mobile
        run: |
          eas build --platform android \
            --profile preview \
            --non-interactive

      - name: Skip Android EAS build (no token)
        if: env.EXPO_TOKEN == ''
        run: echo "EXPO_TOKEN is not set, skipping Android EAS build"

      - name: Download APK
        if: env.EXPO_TOKEN != '' && success()
        working-directory: apps/mobile
        run: |
          eas build:download --platform android --latest

      - name: Upload APK
        if: env.EXPO_TOKEN != '' && success()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-apk-develop-manual
          path: apps/mobile/*.apk
          retention-days: 7

  build-ios-eas:
    name: Build iOS with EAS (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Expo
        if: env.EXPO_TOKEN != ''
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Setup Node.js and pnpm
        if: env.EXPO_TOKEN != ''
        uses: ./.github/actions/setup-node-pnpm

      - name: Build iOS IPA
        if: env.EXPO_TOKEN != ''
        working-directory: apps/mobile
        run: |
          eas build --platform ios \
            --profile preview \
            --non-interactive

      - name: Skip iOS EAS build (no token)
        if: env.EXPO_TOKEN == ''
        run: echo "EXPO_TOKEN is not set, skipping iOS EAS build"
